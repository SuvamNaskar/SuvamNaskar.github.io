<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Arial:wght@400&display=swap"
    />
	<style>
		*{
  	margin: 0%;
	padding: 0%;
}

#headbar{
	background-color: black;
	width: 100%;
	color: white;
	font-size: 24px;
	padding: 1%;
	font-family: 'Arial', 'serif';
}

.loginbox{
	width: 480;
	height: 495;
}

#border{
	width: 460px;
	height: 475px;
	max-width: 460px;
	height: 475px;
	margin-left: auto;
	margin-right: auto;
	margin-top: 10%;
	border-style: solid;
	border-radius: 20px;
	border-color: black;
	font-family: 'Arial', serif;
}

.inputs{
	width: 100%;
	height: 50px;
	max-width: 355px;
	max-height: 50px;
	margin-top: 50px;
	margin-left: 11%;
	border-radius: 15px;
	border-width: 1.5px;
	border-style: solid;
	border-color: black;
}

.inputs:hover{
	border-width: 5px;
}

.inputs:active{
	border-width: 2px;
}

h2{
	font-size: 32px;
	text-align: center;
	margin-top: 30px;
	margin-bottom: 18px;
}

hr{
	border-color: black;
	border-style: solid;
	width: 355px;
	margin-left: auto;
	margin-right: auto;
}

::placeholder{
	padding: 15px;
}

#button{
	width: 170px;
	height: 50px;
	margin: 50px;
	margin-left: 32%;
	background-color: black;
	color: white;
	font-size: 20px;
	font-family: Arial, serif;
}

#button:hover{
	color: black;
	background-color: white;
}

footer{
	margin-top: 50px;
	text-align: center;
	height: 30px;
	font-family: Arial, Helvetica, sans-serif;
}

footer:hover{
	border-width: 3px;
	background-color: black;
	color: white;
	height: 50px;
	font-size: 30px;
	padding-top: 10px;
	font-family: Arial, Helvetica, sans-serif;
}
	</style>
  </head>
  <body>
	<main>
		<header>
			<h1 id="headbar">Biometric System Login</h1>
		</header>
		<section class="loginbox">
			<div id="border">
				<form action="#">
					<h2>Login</h2>
					<hr>
					<input type="number" placeholder="Phone Number" name="phone" id="phone" class="inputs" autofocus required>
					<input type="password" placeholder="Password" name="pass" id="pass" class="inputs" required>
					<button type="submit" id="button">LOGIN</button>
				</form>
			</div>
		</section>
	</main>
	<footer>
		<p>
			Copyright Suvam Naskar 2023
		</p>
	</footer>
  </body>
</html>
