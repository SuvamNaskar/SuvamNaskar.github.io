<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Arial:wght@400&display=swap"
    />
  </head>
  <body>
	<main>
		<header>
			<nav id="headbar">
				<h1>Biometric System Login</h1>
			</nav>
		</header>
		<section class="loginbox">
			<div id="border">
				<form action="#">
					<h2>Login</h2>
					<hr>
					<input type="number" placeholder="Phone Number" name="phone" id="phone" class="inputs" autofocus required>
					<input type="password" placeholder="Password" name="pass" id="pass" class="inputs" required>
					<button type="submit" id="button">LOGIN</button>
				</form>
			</div>
		</section>
	</main>
	<footer>
		<p>
			Copyright Suvam Naskar 2023
		</p>
	</footer>
  </body>
</html>
